<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚰️ Lazarus Protocol Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'JetBrains Mono', monospace; background: #0a0a0f; color: #e0e0e0; min-height: 100vh; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        header { text-align: center; margin-bottom: 30px; padding: 20px; border: 1px solid #1a1a2e; border-radius: 8px; background: linear-gradient(180deg, #0f0f1a 0%, #0a0a0f 100%); }
        header h1 { font-size: 2.5rem; color: #00ff88; text-shadow: 0 0 20px rgba(0, 255, 136, 0.3); margin-bottom: 5px; }
        header p { color: #666; font-size: 0.9rem; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 20px; margin-bottom: 20px; }
        .panel { background: #0f0f1a; border: 1px solid #1a1a2e; border-radius: 8px; overflow: hidden; }
        .panel-header { background: #1a1a2e; padding: 12px 16px; font-size: 0.85rem; font-weight: 600; color: #00ff88; border-bottom: 1px solid #2a2a4e; display: flex; align-items: center; gap: 8px; }
        .panel-body { padding: 16px; }
        .stat-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #1a1a2e; }
        .stat-row:last-child { border-bottom: none; }
        .stat-label { color: #888; font-size: 0.85rem; }
        .stat-value { font-weight: 600; font-size: 0.9rem; }
        .status-armed { color: #00ff88; text-shadow: 0 0 10px rgba(0, 255, 136, 0.5); }
        .status-disarmed { color: #ff4444; text-shadow: 0 0 10px rgba(255, 68, 68, 0.5); }
        .status-running { color: #00ff88; }
        .status-stopped { color: #ff6b6b; }
        .countdown { text-align: center; padding: 20px; }
        .countdown-number { font-size: 4rem; font-weight: 700; line-height: 1; }
        .countdown-label { font-size: 0.9rem; color: #666; margin-top: 5px; }
        .countdown-safe { color: #00ff88; }
        .countdown-warning { color: #ffd93d; }
        .countdown-danger { color: #ff6b6b; }
        .countdown-circle { width: 150px; height: 150px; border-radius: 50%; border: 4px solid #1a1a2e; display: flex; flex-direction: column; align-items: center; justify-content: center; margin: 0 auto 15px; }
        .beneficiary-list { list-style: none; }
        .beneficiary-item { padding: 10px; background: #0a0a0f; border-radius: 4px; margin-bottom: 8px; display: flex; align-items: center; gap: 10px; }
        .beneficiary-avatar { width: 36px; height: 36px; background: linear-gradient(135deg, #00ff88, #00aa55); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 0.9rem; }
        .event-log { max-height: 300px; overflow-y: auto; font-size: 0.8rem; }
        .event-item { padding: 8px; border-bottom: 1px solid #1a1a2e; display: flex; gap: 10px; }
        .event-time { color: #555; white-space: nowrap; }
        .event-content { color: #aaa; word-break: break-all; }
        .event-trigger { color: #ff6b6b; font-weight: 600; }
        .event-checkin { color: #00ff88; }
        .event-failure { color: #ff6b6b; }
        .btn { padding: 12px 24px; border: none; border-radius: 6px; font-family: inherit; font-size: 0.9rem; font-weight: 600; cursor: pointer; transition: all 0.2s ease; display: inline-flex; align-items: center; gap: 8px; }
        .btn-primary { background: linear-gradient(135deg, #00ff88, #00aa55); color: #0a0a0f; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(0, 255, 136, 0.3); }
        .btn-secondary { background: #1a1a2e; color: #e0e0e0; border: 1px solid #2a2a4e; }
        .btn-secondary:hover { background: #2a2a4e; }
        .btn-danger { background: linear-gradient(135deg, #ff6b6b, #cc4444); color: white; }
        .btn-danger:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(255, 107, 107, 0.3); }
        .actions { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 20px; }
        .loading { display: flex; align-items: center; justify-content: center; padding: 40px; color: #666; }
        .loading::after { content: ''; width: 20px; height: 20px; border: 2px solid #1a1a2e; border-top-color: #00ff88; border-radius: 50%; animation: spin 1s linear infinite; margin-left: 10px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .not-initialized { text-align: center; padding: 60px; background: #0f0f1a; border: 1px solid #1a1a2e; border-radius: 8px; }
        .not-initialized h2 { color: #ff6b6b; margin-bottom: 10px; }
        .full-width { grid-column: 1 / -1; }
        .delivery-item { padding: 10px; background: #0a0a0f; border-radius: 4px; margin-bottom: 8px; display: flex; align-items: center; gap: 10px; }
        .delivery-success { border-left: 3px solid #00ff88; }
        .delivery-failed { border-left: 3px solid #ff6b6b; }
        .delivery-icon { font-size: 1.2rem; }
        .toast { position: fixed; bottom: 20px; right: 20px; padding: 15px 25px; background: #1a1a2e; border: 1px solid #00ff88; border-radius: 8px; color: #00ff88; font-weight: 600; transform: translateY(100px); opacity: 0; transition: all 0.3s ease; z-index: 1000; }
        .toast.show { transform: translateY(0); opacity: 1; }
        .toast.error { border-color: #ff6b6b; color: #ff6b6b; }
        footer { text-align: center; margin-top: 30px; padding: 20px; color: #444; font-size: 0.8rem; }
        @media (max-width: 768px) { .grid { grid-template-columns: 1fr; } header h1 { font-size: 1.8rem; } .countdown-number { font-size: 3rem; } }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>⚰️ LAZARUS PROTOCOL</h1>
            <p>Self-hosted Dead Man's Switch Dashboard</p>
        </header>
        
        <div id="content">
            <div class="loading">Loading status</div>
        </div>
        
        <footer>Lazarus Protocol v1.0.0 | Your secrets survive you.</footer>
    </div>
    
    <div id="toast" class="toast"></div>
    
    <script>
        const API_BASE = '';

        async function fetchStatus() {
            try {
                const res = await fetch(`${API_BASE}/status`);
                const data = await res.json();
                renderDashboard(data);
            } catch (err) {
                showToast('Failed to load status', true);
            }
        }

        async function ping() {
            try {
                const res = await fetch(`${API_BASE}/ping`, { method: 'POST', headers: { 'Content-Type': 'application/json' } });
                const data = await res.json();
                if (data.success) {
                    showToast('✓ ' + data.message);
                    fetchStatus();
                } else {
                    showToast('Error: ' + (data.detail || 'Unknown error'), true);
                }
            } catch (err) {
                showToast('Failed to ping', true);
            }
        }

        async function freeze(days = 30) {
            try {
                const res = await fetch(`${API_BASE}/freeze`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ days: days })
                });
                const data = await res.json();
                if (data.success) {
                    showToast('✓ ' + data.message);
                    fetchStatus();
                } else {
                    showToast('Error: ' + (data.detail || 'Unknown error'), true);
                }
            } catch (err) {
                showToast('Failed to freeze', true);
            }
        }

        function showToast(message, isError = false) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = 'toast' + (isError ? ' error' : '');
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        function getStatusColor(remaining) {
            if (remaining > 10) return 'countdown-safe';
            if (remaining < 3) return 'countdown-danger';
            return 'countdown-warning';
        }

        function formatTimestamp(isoString) {
            if (!isoString) return 'Never';
            const date = new Date(isoString);
            const formatted = date.toISOString().replace('T', ' ').slice(0, 16);
            return formatted + ' UTC';
        }

        function getInitials(name) {
            return name.split(' ').map(n => n[0]).join('').toUpperCase().slice(0, 2);
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function renderDashboard(data) {
            const content = document.getElementById('content');

            if (!data.initialized) {
                content.innerHTML = `
                    <div class="not-initialized">
                        <h2>⚠️ Lazarus Not Initialized</h2>
                        <p>Run <code>lazarus init</code> to set up your vault.</p>
                    </div>
                `;
                return;
            }

            const statusClass = data.armed ? 'status-armed' : 'status-disarmed';
            const statusText = data.armed ? '🟢 ARMED' : '🔴 DISARMED';
            const agentClass = data.agent.running ? 'status-running' : 'status-stopped';
            const agentText = data.agent.running ? '● RUNNING (PID: ' + data.agent.pid + ')' : '○ STOPPED';
            const countdownColor = getStatusColor(data.days_remaining);

            let eventsHtml = '';
            if (data.events && data.events.length > 0) {
                data.events.slice().reverse().forEach(event => {
                    let eventClass = 'event-content';
                    if (event.content.includes('TRIGGER')) eventClass = 'event-trigger';
                    else if (event.content.includes('CHECKIN')) eventClass = 'event-checkin';
                    else if (event.content.includes('FAILED')) eventClass = 'event-failure';
                    eventsHtml += `<div class="event-item"><span class="event-time">${escapeHtml(event.timestamp)}</span><span class="${eventClass}">${escapeHtml(event.content)}</span></div>`;
                });
            } else {
                eventsHtml = '<div class="event-item"><span class="event-content" style="color:#666;">No events yet</span></div>';
            }

            let deliveriesHtml = '';
            if (data.deliveries && data.deliveries.length > 0) {
                data.deliveries.slice().reverse().forEach(d => {
                    const icon = d.success ? '✓' : '✗';
                    const cls = d.success ? 'delivery-success' : 'delivery-failed';
                    deliveriesHtml += `<div class="delivery-item ${cls}"><span class="delivery-icon">${icon}</span><span>${escapeHtml(d.content)}</span></div>`;
                });
            } else {
                deliveriesHtml = '<div class="delivery-item"><span style="color:#666;">No deliveries yet</span></div>';
            }

            let beneficiariesHtml = '';
            data.beneficiaries.forEach(b => {
                beneficiariesHtml += `<li class="beneficiary-item"><div class="beneficiary-avatar">${getInitials(b.name)}</div><span>${escapeHtml(b.name)}</span></li>`;
            });

            content.innerHTML = `
                <div class="grid">
                    <div class="panel">
                        <div class="panel-header">⚰️ STATUS</div>
                        <div class="panel-body">
                            <div class="stat-row"><span class="stat-label">Switch</span><span class="stat-value ${statusClass}">${statusText}</span></div>
                            <div class="stat-row"><span class="stat-label">Agent</span><span class="stat-value ${agentClass}">${agentText}</span></div>
                            <div class="stat-row"><span class="stat-label">Owner</span><span class="stat-value">${escapeHtml(data.owner_name)}</span></div>
                            <div class="stat-row"><span class="stat-label">Check-in Interval</span><span class="stat-value">${data.checkin_interval_days} days</span></div>
                        </div>
                    </div>
                    
                    <div class="panel">
                        <div class="panel-header">⏱️ COUNTDOWN</div>
                        <div class="panel-body countdown">
                            <div class="countdown-circle">
                                <span class="countdown-number ${countdownColor}">${data.days_remaining}</span>
                                <span class="countdown-label">days remaining</span>
                            </div>
                            <div class="stat-row"><span class="stat-label">Days Since Ping</span><span class="stat-value">${data.days_since_ping} days</span></div>
                            <div class="stat-row"><span class="stat-label">Last Ping</span><span class="stat-value">${formatTimestamp(data.last_ping)}</span></div>
                        </div>
                    </div>
                    
                    <div class="panel">
                        <div class="panel-header">👥 BENEFICIARIES</div>
                        <div class="panel-body">
                            <div class="stat-row"><span class="stat-label">Count</span><span class="stat-value">${data.beneficiary_count}</span></div>
                            <ul class="beneficiary-list" style="margin-top: 15px;">${beneficiariesHtml}</ul>
                        </div>
                    </div>
                    
                    <div class="panel">
                        <div class="panel-header">📧 DELIVERY LOG</div>
                        <div class="panel-body event-log">${deliveriesHtml}</div>
                    </div>
                    
                    <div class="panel full-width">
                        <div class="panel-header">📜 EVENT LOG</div>
                        <div class="panel-body event-log">${eventsHtml}</div>
                    </div>
                </div>
                
                <div class="actions">
                    <button class="btn btn-primary" onclick="ping()">✓ Check In (Ping)</button>
                    <button class="btn btn-secondary" onclick="fetchStatus()">🔄 Refresh</button>
                    <button class="btn btn-danger" onclick="freeze(30)">🧊 Freeze (+30 days)</button>
                </div>
            `;
        }

        fetchStatus();
        setInterval(fetchStatus, 30000);
    </script>
</body>
</html>
